<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> hover Html</title>
    <style>
        body
        { 
            font-family: Arial, Helvetica, sans-serif;
        }
        div:hover{ 
            color: white;
            font-family: cursive;
            font-size: 1.5em;
            background-color: royalblue;
            width: 300px;
            display: inline-block;
            
            }
            .explo{
                background-color: lightgray;
                text-align: center;
                height: 90px;
                width: 90px;
                border: 1px solid black;
                display: inline-block;
            }
             .explo:hover{
                 background-color: yellow;
             }

    </style>
</head>
<body>
    <h1> Exemplo de Hover </h1>
    <div class="explo">
        Passe o mause aqui
    <p>Passe o mause sobre texto abaixo</p>
    </div> 

    <div>
        Passe o mause aqui
        <p>Texto Escondido &radic;;</p>
        
    </div>

</body>
</html>
